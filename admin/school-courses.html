  <style>
    .course-color-swatch { width:24px;height:24px;border-radius:6px;display:inline-block;flex-shrink:0; }
  </style>
</head>
<body>

        <div class="sidebar-logo-text">DALIGHT<span>Administration</span></div>
      </a>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-title">Principal</div>
        <a href="dashboard.html" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>Dashboard</a>
        <a href="reservations.html" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>Réservations<span class="badge" id="pending-count">0</span></a>
        <a href="pos.html" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>Caisse / POS</a>
      </div>
      <div class="nav-section">
        <div class="nav-section-title" style="color:#4f46e5;display:flex;align-items:center;gap:.35rem;"><svg width="13" height="13" fill="none" stroke="#4f46e5" stroke-width="2.2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 14l9-5-9-5-9 5 9 5z"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0112 20.055a11.952 11.952 0 01-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/></svg>DALIGHT SCHOOL</div>
        <a href="school-courses.html" class="nav-item active"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 14l9-5-9-5-9 5 9 5z"/></svg>Cours</a>
        <a href="school-students.html" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>Étudiants</a>
        <a href="school-professors.html" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>Professeurs</a>
        <a href="../dalight-school/index.html" target="_blank" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>Portail School</a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-user-avatar" id="user-avatar">A</div>
        <div class="sidebar-user-info"><div class="sidebar-user-name" id="user-name">Admin</div><div class="sidebar-user-role">Administrateur</div></div>
      </div>
      <button class="btn-logout" id="logout-btn">Déconnexion</button>
    </div>
  </aside>

  <div class="admin-main">
    <header class="admin-header">
      <button class="btn-icon" id="mobile-menu-btn"><i data-lucide="menu"></i></button>
      <h1 class="admin-page-title"><i data-lucide="book-open"></i> Cours — DALIGHT SCHOOL</h1>
      <div style="display:flex;gap:.75rem;align-items:center;margin-left:auto;">
        <a href="school-students.html" class="btn btn-secondary btn-sm"><i data-lucide="users"></i> Étudiants</a>
        <a href="school-professors.html" class="btn btn-secondary btn-sm"><i data-lucide="user"></i> Professeurs</a>
        <button class="btn btn-primary" onclick="openAddModal()"><i data-lucide="plus"></i> Nouveau cours</button>
      </div>
    </header>

    <div class="admin-content">
      <!-- Stats row -->
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:1.5rem;" id="stats-row"></div>

      <!-- Courses grid -->
      <div id="courses-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.25rem;"></div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-add" style="display:none;">
    <div class="modal" style="max-width:500px;">
      <div class="modal-header"><h2 id="modal-title">Nouveau cours</h2><button class="btn-icon" onclick="closeModal()"><i data-lucide="x"></i></button></div>
      <div class="modal-body">
        <div class="form-group"><label class="form-label">Nom du cours <span style="color:red">*</span></label><input class="form-control" id="f-name" placeholder="Ex: Biologie Générale"></div>
        <div class="form-group"><label class="form-label">Description</label><textarea class="form-control" id="f-desc" rows="2" placeholder="Description courte…"></textarea></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
          <div class="form-group">
            <label class="form-label">Code unique <span style="color:red">*</span></label>
            <input class="form-control" id="f-code" placeholder="Ex: BIO-101" style="text-transform:uppercase;font-family:monospace;">
          </div>
          <div class="form-group">
            <label class="form-label">Couleur</label>
            <input class="form-control" id="f-color" type="color" value="#4f46e5" style="height:42px;padding:.3rem;">
          </div>
        </div>
        <div class="form-group" style="display:flex;align-items:center;gap:.5rem;">
          <input type="checkbox" id="f-active" checked style="width:16px;height:16px;">
          <label for="f-active" style="font-size:.875rem;font-weight:500;">Cours actif</label>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
        <button class="btn btn-primary" id="btn-save" onclick="saveCourse()">Enregistrer</button>
      </div>
    </div>
  </div>

  <script src="js/admin-core.js?v=202606271350"></script>
  <script>
    let allCourses = [], editingId = null;
    let sb;

    function getSchoolAdminSupabase() {
      if (window.dalightAdminSupabase) return window.dalightAdminSupabase;
      if (window.adminCore?.supabase) return window.adminCore.supabase;
      if (window.supabaseClient) return window.supabaseClient;
      return null;
    }

    function startSchoolPage() {
      sb = getSchoolAdminSupabase();
      if (!sb) {
        setTimeout(startSchoolPage, 100);
        return;
      }
      init();
    }

    async function init() {
      const grid = document.getElementById('courses-grid');
      try {
        const [{ data: courses, error: coursesError }, { data: enrollments, error: enrollmentsError }, { data: profs, error: profsError }] = await Promise.all([
          sb.from('dalightschool_courses').select('*').order('name'),
          sb.from('dalightschool_enrollments').select('course_id'),
          sb.from('dalightschool_professors').select('name,course_id').eq('is_active', true),
        ]);
        const error = coursesError || enrollmentsError || profsError;
        if (error) throw error;
        allCourses = courses || [];

      // Stats
      document.getElementById('stats-row').innerHTML = `
        <div class="card" style="padding:1.1rem;display:flex;align-items:center;gap:.8rem;"><div style="width:40px;height:40px;border-radius:10px;background:#e0e7ff;display:flex;align-items:center;justify-content:center;"><i data-lucide="book-open" style="color:#4f46e5;width:20px;height:20px;"></i></div><div><div style="font-size:1.4rem;font-weight:800;">${allCourses.length}</div><div style="font-size:.75rem;color:var(--admin-text-muted);">Cours</div></div></div>
        <div class="card" style="padding:1.1rem;display:flex;align-items:center;gap:.8rem;"><div style="width:40px;height:40px;border-radius:10px;background:#dcfce7;display:flex;align-items:center;justify-content:center;"><i data-lucide="users" style="color:#10b981;width:20px;height:20px;"></i></div><div><div style="font-size:1.4rem;font-weight:800;">${new Set((enrollments||[]).map(e=>e.course_id)).size}</div><div style="font-size:.75rem;color:var(--admin-text-muted);">Cours avec étudiants</div></div></div>
        <div class="card" style="padding:1.1rem;display:flex;align-items:center;gap:.8rem;"><div style="width:40px;height:40px;border-radius:10px;background:#ede9fe;display:flex;align-items:center;justify-content:center;"><i data-lucide="user" style="color:#8b5cf6;width:20px;height:20px;"></i></div><div><div style="font-size:1.4rem;font-weight:800;">${(profs||[]).length}</div><div style="font-size:.75rem;color:var(--admin-text-muted);">Professeurs actifs</div></div></div>`;

      if (!allCourses.length) {
        grid.innerHTML = `<div class="card" style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--admin-text-muted);"><i data-lucide="book-open" style="width:48px;height:48px;opacity:.3;display:block;margin:0 auto 1rem;"></i><h3 style="margin-bottom:.5rem;">Aucun cours créé</h3><p>Créez votre premier cours pour commencer.</p></div>`;
      } else {
        grid.innerHTML = allCourses.map(c => {
          const enrolled = (enrollments||[]).filter(e => e.course_id === c.id).length;
          const prof     = (profs||[]).find(p => p.course_id === c.id);
          return `
            <div class="card" style="padding:0;overflow:hidden;">
              <div style="height:80px;background:linear-gradient(135deg,${c.color},${c.color}cc);display:flex;align-items:center;padding:1.25rem;gap:.75rem;">
                <div style="width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,.2);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;">
                  <i data-lucide="book-open" style="width:22px;height:22px;color:white;"></i>
                </div>
                <div style="flex:1;color:#fff;">
                  <div style="font-weight:800;font-size:.95rem;">${c.name}</div>
                  <div style="font-size:.75rem;opacity:.8;">Code: ${c.code}</div>
                </div>
                ${c.is_active ? '' : '<span style="background:rgba(0,0,0,.3);color:#fff;font-size:.7rem;padding:.15rem .5rem;border-radius:99px;">Inactif</span>'}
              </div>
              <div style="padding:1rem;">
                <div style="font-size:.85rem;color:var(--admin-text-muted);margin-bottom:.75rem;">${c.description || 'Aucune description'}</div>
                <div style="display:flex;gap:.5rem;flex-wrap:wrap;font-size:.78rem;">
                  <span style="background:#e0e7ff;color:#4338ca;padding:.2rem .6rem;border-radius:99px;display:inline-flex;align-items:center;gap:.3rem;"><i data-lucide="users" style="width:13px;height:13px;"></i>${enrolled} étudiant(s)</span>
                  <span style="background:#ede9fe;color:#5b21b6;padding:.2rem .6rem;border-radius:99px;display:inline-flex;align-items:center;gap:.3rem;"><i data-lucide="user" style="width:13px;height:13px;"></i>${prof ? prof.name : 'Sans prof'}</span>
                </div>
              </div>
              <div style="padding:.75rem 1rem;border-top:1px solid var(--admin-border);display:flex;gap:.5rem;">
                <button class="btn btn-secondary btn-sm" onclick="editCourse('${c.id}')"><i data-lucide="pencil"></i> Modifier</button>
                <button class="btn btn-danger btn-sm" onclick="deleteCourse('${c.id}','${c.name}')"><i data-lucide="trash-2"></i></button>
              </div>
            </div>`;
        }).join('');
      }

      lucide.createIcons();
      } catch (error) {
        grid.innerHTML = `<div class="card" style="grid-column:1/-1;padding:1.25rem;color:#b91c1c;background:#fee2e2;border:1px solid #fecaca;">Erreur DALIGHT SCHOOL: ${error.message}</div>`;
      }
    }

    function openAddModal() {
      editingId = null;
      document.getElementById('modal-title').textContent = 'Nouveau cours';
      ['f-name','f-desc','f-code'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('f-color').value  = '#4f46e5';
      document.getElementById('f-active').checked = true;
      document.getElementById('modal-add').style.display = 'flex';
    }

    function editCourse(id) {
      const c = allCourses.find(x => x.id === id);
      if (!c) return;
      editingId = id;
      document.getElementById('modal-title').textContent = 'Modifier le cours';
      document.getElementById('f-name').value  = c.name;
      document.getElementById('f-desc').value  = c.description || '';
      document.getElementById('f-code').value  = c.code;
      document.getElementById('f-color').value = c.color || '#4f46e5';
      document.getElementById('f-active').checked = c.is_active;
      document.getElementById('modal-add').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal-add').style.display = 'none'; }

    window.openAddModal = openAddModal;
    window.editCourse = editCourse;
    window.closeModal = closeModal;
    window.saveCourse = saveCourse;
    window.deleteCourse = deleteCourse;

    async function saveCourse() {
      const name = document.getElementById('f-name').value.trim();
      const code = document.getElementById('f-code').value.trim().toUpperCase();
      if (!name || !code) { alert('Nom et code requis.'); return; }

      const btn = document.getElementById('btn-save');
      btn.disabled = true; btn.textContent = 'Enregistrement…';

      const payload = { name, code, description: document.getElementById('f-desc').value.trim()||null, color: document.getElementById('f-color').value, is_active: document.getElementById('f-active').checked, updated_at: new Date().toISOString() };

      const { error } = editingId
        ? await sb.from('dalightschool_courses').update(payload).eq('id', editingId)
        : await sb.from('dalightschool_courses').insert(payload);

      if (error) { alert('Erreur: ' + error.message); }
      else { closeModal(); init(); window.adminCore.showToast('Cours enregistré !'); }
      btn.disabled = false; btn.textContent = 'Enregistrer';
    }

    async function deleteCourse(id, name) {
      if (!confirm(`Supprimer le cours "${name}" ? Cette action est irréversible.`)) return;
      const { error } = await sb.from('dalightschool_courses').delete().eq('id', id);
      if (error) alert('Erreur: ' + error.message);
      else { window.adminCore.showToast('Cours supprimé.'); init(); }
    }

    startSchoolPage();
  </script>
</body>
</html>

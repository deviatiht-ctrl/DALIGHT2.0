    <nav class="sidebar-nav">

        <a href="dashboard.html" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>Dashboard</a>

        <a href="pos.html" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>Caisse / POS</a>
      </div>

        <div class="nav-section-title" style="color:#4f46e5;display:flex;align-items:center;gap:.35rem;"><svg width="13" height="13" fill="none" stroke="#4f46e5" stroke-width="2.2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 14l9-5-9-5-9 5 9 5z"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0112 20.055a11.952 11.952 0 01-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/></svg>DALIGHT SCHOOL</div>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-user-avatar" id="user-avatar">A</div>
        <div class="sidebar-user-info"><div class="sidebar-user-name" id="user-name">Admin</div><div class="sidebar-user-role">Administrateur</div></div>
      </div>
      <button class="btn-logout" id="logout-btn">Déconnexion</button>
    </div>
  </aside>

  <div class="admin-main">
    <header class="admin-header">
      <button class="btn-icon" id="mobile-menu-btn"><i data-lucide="menu"></i></button>
      <h1 class="admin-page-title"><i data-lucide="user"></i> Professeurs — DALIGHT SCHOOL</h1>
      <button class="btn btn-primary" style="margin-left:auto;" onclick="openAddModal()"><i data-lucide="plus"></i> Nouveau professeur</button>
    </header>

    <div class="admin-content">
      <div class="card" style="padding:0;overflow:hidden;">
        <table class="admin-table">
          <thead><tr><th>Nom</th><th>Code d'accès</th><th>Cours assigné</th><th>Email</th><th>Statut</th><th>Actions</th></tr></thead>
          <tbody id="profs-tbody"><tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--admin-text-muted);">Chargement…</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-add" style="display:none;">
    <div class="modal" style="max-width:480px;">
      <div class="modal-header"><h2 id="modal-title">Nouveau professeur</h2><button class="btn-icon" onclick="closeModal()"><i data-lucide="x"></i></button></div>
      <div class="modal-body">
        <div class="form-group"><label class="form-label">Nom complet <span style="color:red">*</span></label><input class="form-control" id="f-name" placeholder="Ex: Dr. Marie Dupont"></div>
        <div class="form-group"><label class="form-label">Email</label><input class="form-control" id="f-email" type="email" placeholder="marie@dalight.ht"></div>
        <div class="form-group">
          <label class="form-label">Code d'accès <span style="color:red">*</span></label>
          <div style="display:flex;gap:.5rem;">
            <input class="form-control" id="f-code" placeholder="PROF-BIO-001" style="flex:1;font-family:monospace;font-weight:700;letter-spacing:.06em;text-transform:uppercase;">
            <button class="btn btn-secondary" onclick="genProfCode()" type="button">Générer</button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Cours assigné</label>
          <select class="form-control" id="f-course"><option value="">— Aucun —</option></select>
        </div>
        <div class="form-group"><label class="form-label">Bio / Spécialité</label><textarea class="form-control" id="f-bio" rows="2" placeholder="Spécialité, diplômes…"></textarea></div>
        <div class="form-group" style="display:flex;align-items:center;gap:.5rem;">
          <input type="checkbox" id="f-active" checked style="width:16px;height:16px;">
          <label for="f-active" style="font-size:.875rem;font-weight:500;">Compte actif</label>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
        <button class="btn btn-primary" id="btn-save" onclick="saveProfessor()">Enregistrer</button>
      </div>
    </div>
  </div>

  <script src="js/admin-core.js?v=202606271350"></script>
  <script>
    var allProfs = [], allCourses = [], editingId = null, sb;

    function getSB() {
      return window.dalightAdminSupabase || (window.adminCore && window.adminCore.supabase) || null;
    }

    (function startSchoolPage() {
      sb = getSB();
      if (!sb) { setTimeout(startSchoolPage, 100); return; }
      init();
    })();

    async function init() {
      var tbody = document.getElementById('profs-tbody');
      try {
        var res = await Promise.all([
          sb.from('dalightschool_professors').select('*, course:dalightschool_courses(name,color)').order('name'),
          sb.from('dalightschool_courses').select('*').order('name')
        ]);
        var err = res[0].error || res[1].error;
        if (err) throw err;
        allProfs   = res[0].data || [];
        allCourses = res[1].data || [];

        var sel = document.getElementById('f-course');
        while (sel.options.length > 1) sel.remove(1);
        allCourses.forEach(function(c) { var o = document.createElement('option'); o.value = c.id; o.textContent = c.name; sel.appendChild(o); });

        lucide.createIcons();
        renderTable();
      } catch(e) {
        tbody.innerHTML = '<tr><td colspan="6" style="padding:1.25rem;color:#b91c1c;background:#fee2e2;">Erreur: ' + e.message + '</td></tr>';
      }
    }

    function renderTable() {
      document.getElementById('profs-tbody').innerHTML = allProfs.length ? allProfs.map(function(p) {
        var ch = p.course
          ? '<span style="display:inline-flex;align-items:center;gap:.4rem;"><span style="width:8px;height:8px;border-radius:50%;background:' + p.course.color + ';display:inline-block;"></span>' + p.course.name + '</span>'
          : '<span style="color:var(--admin-text-muted);font-size:.8rem;">Aucun</span>';
        var bg  = p.is_active ? '#dcfce7' : '#fee2e2';
        var clr = p.is_active ? '#166534' : '#991b1b';
        var st  = p.is_active ? 'Actif' : 'Inactif';
        var ai  = p.is_active ? 'user-x' : 'user-check';
        return '<tr>' +
          '<td style="font-weight:600;">' + p.name + '</td>' +
          '<td><span class="code-box" onclick="copyCode(\'' + p.code_acces + '\')" title="Copier">' + p.code_acces + '</span></td>' +
          '<td>' + ch + '</td>' +
          '<td style="font-size:.85rem;">' + (p.email||'—') + '</td>' +
          '<td><span style="display:inline-flex;align-items:center;gap:.3rem;padding:.2rem .6rem;border-radius:99px;font-size:.72rem;font-weight:600;background:' + bg + ';color:' + clr + ';">' + st + '</span></td>' +
          '<td><div style="display:flex;gap:.4rem;">' +
            '<button class="btn btn-icon btn-sm" onclick="editProfessor(\'' + p.id + '\')"><i data-lucide="pencil"></i></button>' +
            '<button class="btn btn-icon btn-sm" onclick="printCode(\'' + p.name.replace(/'/g,"\\x27") + '\',\'' + p.code_acces + '\')"><i data-lucide="printer"></i></button>' +
            '<button class="btn btn-icon btn-sm btn-danger" onclick="toggleActive(\'' + p.id + '\',' + p.is_active + ')"><i data-lucide="' + ai + '"></i></button>' +
          '</div></td></tr>';
      }).join('') : '<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--admin-text-muted);">Aucun professeur</td></tr>';
      lucide.createIcons();
    }

    function genProfCode() {
      document.getElementById('f-code').value = 'PROF-DS-' + String(allProfs.length + 1).padStart(3, '0');
    }

    function openAddModal() {
      editingId = null;
      document.getElementById('modal-title').textContent = 'Nouveau professeur';
      ['f-name','f-email','f-bio','f-code'].forEach(function(id) { document.getElementById(id).value = ''; });
      document.getElementById('f-course').value = '';
      document.getElementById('f-active').checked = true;
      genProfCode();
      document.getElementById('modal-add').style.display = 'flex';
    }

    function editProfessor(id) {
      var p = allProfs.find(function(x) { return x.id === id; });
      if (!p) return;
      editingId = id;
      document.getElementById('modal-title').textContent = 'Modifier le professeur';
      document.getElementById('f-name').value   = p.name;
      document.getElementById('f-email').value  = p.email || '';
      document.getElementById('f-code').value   = p.code_acces;
      document.getElementById('f-bio').value    = p.bio || '';
      document.getElementById('f-course').value = p.course_id || '';
      document.getElementById('f-active').checked = p.is_active;
      document.getElementById('modal-add').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal-add').style.display = 'none'; }

    async function saveProfessor() {
      var name = document.getElementById('f-name').value.trim();
      var code = document.getElementById('f-code').value.trim().toUpperCase();
      if (!name || !code) { alert('Nom et code requis.'); return; }
      var btn = document.getElementById('btn-save');
      btn.disabled = true; btn.textContent = 'Enregistrement…';
      var payload = { name: name, code_acces: code, email: document.getElementById('f-email').value.trim()||null, bio: document.getElementById('f-bio').value.trim()||null, course_id: document.getElementById('f-course').value||null, is_active: document.getElementById('f-active').checked, updated_at: new Date().toISOString() };
      var r = editingId
        ? await sb.from('dalightschool_professors').update(payload).eq('id', editingId)
        : await sb.from('dalightschool_professors').insert(payload);
      if (r.error) { alert('Erreur: ' + r.error.message); }
      else { closeModal(); init(); if (window.adminCore) window.adminCore.showToast('Professeur enregistré !'); }
      btn.disabled = false; btn.textContent = 'Enregistrer';
    }

    async function toggleActive(id, cur) {
      await sb.from('dalightschool_professors').update({ is_active: !cur }).eq('id', id);
      init();
    }

    function copyCode(code) {
      navigator.clipboard.writeText(code).then(function() { if (window.adminCore) window.adminCore.showToast('Code copié: ' + code); });
    }

    function printCode(name, code) {
      var w = window.open('', '_blank', 'width=400,height=300');
      var html = '<html><body onload="print()" style="font-family:Inter,sans-serif;text-align:center;padding:2rem;">' +
        '<h2 style="color:#4f46e5;">DALIGHT SCHOOL</h2>' +
        '<p>Professeur: <strong>' + name + '</strong></p>' +
        '<p style="font-size:1.5rem;font-weight:800;letter-spacing:.1em;background:#ede9fe;padding:.75rem 1.5rem;border-radius:8px;display:inline-block;">' + code + '</p>' +
        '<p style="font-size:.8rem;color:#666;">Portail: ' + window.location.origin + '/dalight-school/</p>' +
        '</body></html>';
      w.document.write(html);
      w.document.close();
    }
  </script>
</body>
</html>

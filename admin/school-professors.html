    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-title">Principal</div>
        <a href="dashboard.html" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>Dashboard</a>

        <a href="pos.html" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>Caisse / POS</a>
      </div>
      <div class="nav-section">
        <div class="nav-section-title" style="color:#4f46e5;display:flex;align-items:center;gap:.35rem;"><svg width="13" height="13" fill="none" stroke="#4f46e5" stroke-width="2.2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 14l9-5-9-5-9 5 9 5z"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0112 20.055a11.952 11.952 0 01-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/></svg>DALIGHT SCHOOL</div>

      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-user-avatar" id="user-avatar">A</div>
        <div class="sidebar-user-info"><div class="sidebar-user-name" id="user-name">Admin</div><div class="sidebar-user-role">Administrateur</div></div>
      </div>
      <button class="btn-logout" id="logout-btn">Déconnexion</button>
    </div>
  </aside>

  <div class="admin-main">
    <header class="admin-header">
      <button class="btn-icon" id="mobile-menu-btn"><i data-lucide="menu"></i></button>
      <h1 class="admin-page-title"><i data-lucide="user"></i> Professeurs — DALIGHT SCHOOL</h1>
      <button class="btn btn-primary" style="margin-left:auto;" onclick="openAddModal()"><i data-lucide="plus"></i> Nouveau professeur</button>
    </header>

    <div class="admin-content">
      <div class="card" style="padding:0;overflow:hidden;">
        <table class="admin-table">
          <thead><tr><th>Nom</th><th>Code d'accès</th><th>Cours assigné</th><th>Email</th><th>Statut</th><th>Actions</th></tr></thead>
          <tbody id="profs-tbody"><tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--admin-text-muted);">Chargement…</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-add" style="display:none;">
    <div class="modal" style="max-width:480px;">
      <div class="modal-header"><h2 id="modal-title">Nouveau professeur</h2><button class="btn-icon" onclick="closeModal()"><i data-lucide="x"></i></button></div>
      <div class="modal-body">
        <div class="form-group"><label class="form-label">Nom complet <span style="color:red">*</span></label><input class="form-control" id="f-name" placeholder="Ex: Dr. Marie Dupont"></div>
        <div class="form-group"><label class="form-label">Email</label><input class="form-control" id="f-email" type="email" placeholder="marie@dalight.ht"></div>
        <div class="form-group">
          <label class="form-label">Code d'accès <span style="color:red">*</span></label>
          <div style="display:flex;gap:.5rem;">
            <input class="form-control" id="f-code" placeholder="PROF-BIO-001" style="flex:1;font-family:monospace;font-weight:700;letter-spacing:.06em;text-transform:uppercase;">
            <button class="btn btn-secondary" onclick="genProfCode()" type="button">Générer</button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Cours assigné</label>
          <select class="form-control" id="f-course"><option value="">— Aucun —</option></select>
        </div>
        <div class="form-group"><label class="form-label">Bio / Spécialité</label><textarea class="form-control" id="f-bio" rows="2" placeholder="Spécialité, diplômes…"></textarea></div>
        <div class="form-group" style="display:flex;align-items:center;gap:.5rem;">
          <input type="checkbox" id="f-active" checked style="width:16px;height:16px;">
          <label for="f-active" style="font-size:.875rem;font-weight:500;">Compte actif</label>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
        <button class="btn btn-primary" id="btn-save" onclick="saveProfessor()">Enregistrer</button>
      </div>
    </div>
  </div>

  <script src="js/admin-core.js?v=202606271350"></script>
  <script src="js/school-professors.js?v=20260628"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mon Espace — DALIGHT SCHOOL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/school.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="school-shell">

  <!-- Header -->
  <header class="school-header">
    <div class="school-header-logo">
      <div class="logo-dot"></div>
      DALIGHT SCHOOL
    </div>
    <div class="school-header-title" id="header-greeting">Bonjour 👋</div>
    <div class="school-header-actions">
      <div class="header-avatar" id="header-avatar" title="Mon compte">?</div>
      <button class="sc-btn sc-btn-secondary sc-btn-sm" onclick="schoolLogout()">Déconnexion</button>
    </div>
  </header>

  <!-- Sidebar -->
  <aside class="school-sidebar" id="sidebar">
    <div class="school-sidebar-section">
      <div class="school-sidebar-section-title">Mon espace</div>
      <a href="index.html" class="sc-nav-item active">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Tableau de bord
      </a>
      <a href="grades.html" class="sc-nav-item">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
        Mes Notes
      </a>
    </div>
    <div class="school-sidebar-section">
      <div class="school-sidebar-section-title">Cours</div>
      <div id="sidebar-courses"></div>
    </div>
  </aside>

  <!-- Main -->
  <main class="school-main">

    <!-- Welcome Banner -->
    <div id="welcome-banner" style="background:linear-gradient(135deg,#4f46e5,#8b5cf6);border-radius:20px;padding:1.75rem 2rem;color:#fff;margin-bottom:2rem;animation:slideUp .4s ease;position:relative;overflow:hidden;">
      <div style="position:absolute;right:-20px;top:-20px;width:160px;height:160px;background:rgba(255,255,255,.07);border-radius:50%;"></div>
      <div style="position:absolute;right:60px;bottom:-40px;width:100px;height:100px;background:rgba(255,255,255,.05);border-radius:50%;"></div>
      <div style="font-size:.8rem;opacity:.8;margin-bottom:.25rem;">Bienvenue sur DALIGHT SCHOOL</div>
      <div style="font-size:1.5rem;font-weight:800;" id="welcome-name">Étudiant</div>
      <div style="font-size:.85rem;opacity:.75;margin-top:.25rem;" id="welcome-sub">Consulte tes cours et devoirs ci-dessous</div>
    </div>

    <!-- Stats -->
    <div class="sc-stats" id="stats-row">
      <div class="sc-stat" style="animation-delay:.05s">
        <div class="sc-stat-icon" style="background:#e0e7ff;"><svg width="24" height="24" fill="none" stroke="#4f46e5" stroke-width="2" viewBox="0 0 24 24"><path d="M12 14l9-5-9-5-9 5 9 5z"/><path d="M12 14v8"/></svg></div>
        <div><div class="sc-stat-value" id="stat-courses">—</div><div class="sc-stat-label">Cours inscrits</div></div>
      </div>
      <div class="sc-stat" style="animation-delay:.1s">
        <div class="sc-stat-icon" style="background:#fef3c7;"><svg width="24" height="24" fill="none" stroke="#f59e0b" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12h6M9 16h6M9 8h6M5 3h14a2 2 0 012 2v16a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2z"/></svg></div>
        <div><div class="sc-stat-value" id="stat-assignments">—</div><div class="sc-stat-label">Devoirs à rendre</div></div>
      </div>
      <div class="sc-stat" style="animation-delay:.15s">
        <div class="sc-stat-icon" style="background:#dcfce7;"><svg width="24" height="24" fill="none" stroke="#10b981" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
        <div><div class="sc-stat-value" id="stat-exams">—</div><div class="sc-stat-label">Examens actifs</div></div>
      </div>
      <div class="sc-stat" style="animation-delay:.2s">
        <div class="sc-stat-icon" style="background:#ede9fe;"><svg width="24" height="24" fill="none" stroke="#8b5cf6" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
        <div><div class="sc-stat-value" id="stat-avg">—</div><div class="sc-stat-label">Moyenne générale</div></div>
      </div>
    </div>

    <!-- Courses -->
    <div class="sc-section-title">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 14l9-5-9-5-9 5 9 5z"/><path d="M12 14l6.16-3.422a12 12 0 01.665 6.479A11.952 11.952 0 0012 20.055"/></svg>
      Mes Cours
    </div>
    <div class="sc-courses-grid" id="courses-grid">
      <!-- skeleton -->
      <div class="sc-skeleton" style="height:200px;"></div>
      <div class="sc-skeleton" style="height:200px;animation-delay:.1s"></div>
      <div class="sc-skeleton" style="height:200px;animation-delay:.2s"></div>
    </div>

    <!-- Upcoming Assignments -->
    <div class="sc-section-title" style="margin-top:2rem;">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12h6M9 16h6M9 8h6M5 3h14a2 2 0 012 2v16a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2z"/></svg>
      Devoirs à venir
    </div>
    <div id="assignments-list" style="display:flex;flex-direction:column;gap:.75rem;">
      <div class="sc-skeleton" style="height:60px;"></div>
      <div class="sc-skeleton" style="height:60px;animation-delay:.1s"></div>
    </div>

  </main>
</div>

<script src="../js/school-core.js"></script>
<script>
  const session = requireSchoolSession('student');
  if (!session) throw new Error('Not logged in');

  const sb = window.schoolSb;

  document.getElementById('header-greeting').textContent = `Bonjour, ${session.name.split(' ')[0]} 👋`;
  document.getElementById('header-avatar').textContent   = schoolInitials(session.name);
  document.getElementById('welcome-name').textContent    = session.name;

  async function loadDashboard() {
    // Load enrollments with course data
    const { data: enrollments } = await sb
      .from('dalightschool_enrollments')
      .select('*, course:dalightschool_courses(*)')
      .eq('student_id', session.id);

    const courses = (enrollments || []).map(e => e.course).filter(Boolean);

    // Render stat
    document.getElementById('stat-courses').textContent = courses.length;

    // Sidebar courses
    const sidebarCourses = document.getElementById('sidebar-courses');
    sidebarCourses.innerHTML = courses.map(c => `
      <a href="course.html?id=${c.id}" class="sc-nav-item">
        <div style="width:8px;height:8px;border-radius:50%;background:${c.color};flex-shrink:0;"></div>
        ${c.name}
      </a>`).join('') || '<div style="padding:.5rem 1.25rem;font-size:.8rem;color:var(--sc-muted);">Aucun cours</div>';

    // Render courses grid
    const grid = document.getElementById('courses-grid');
    if (!courses.length) {
      grid.innerHTML = `<div class="sc-empty" style="grid-column:1/-1"><svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 14l9-5-9-5-9 5 9 5z"/></svg><h3>Aucun cours pour le moment</h3><p>L'administration va bientôt vous inscrire à vos cours.</p></div>`;
    } else {
      grid.innerHTML = courses.map((c, i) => `
        <div class="sc-course-card" onclick="window.location.href='course.html?id=${c.id}'" style="animation-delay:${i*0.07}s">
          <div class="sc-course-banner" style="background:linear-gradient(135deg,${c.color},${c.color}aa)">
            <div class="sc-course-icon">
              <svg width="26" height="26" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><path d="M12 14l9-5-9-5-9 5 9 5z"/><path d="M12 14l6.16-3.422a12 12 0 01.665 6.479"/></svg>
            </div>
          </div>
          <div class="sc-course-body">
            <div class="sc-course-name">${c.name}</div>
            <div class="sc-course-meta">${c.description || 'Aucune description'}</div>
          </div>
          <div class="sc-course-footer">
            <span class="sc-badge sc-badge-primary">Code: ${c.code}</span>
            <span style="margin-left:auto;font-size:.75rem;color:var(--sc-muted);">→ Accéder</span>
          </div>
        </div>`).join('');
    }

    // Load assignments for enrolled courses
    const courseIds = courses.map(c => c.id);
    let pendingAssignments = 0;
    let activeExams = 0;

    if (courseIds.length) {
      const { data: assignments } = await sb
        .from('dalightschool_assignments')
        .select('*')
        .in('course_id', courseIds)
        .eq('is_active', true)
        .order('due_date', { ascending: true });

      // Check which ones student already submitted
      const { data: submissions } = await sb
        .from('dalightschool_submissions')
        .select('assignment_id')
        .eq('student_id', session.id);

      const submittedIds = new Set((submissions || []).map(s => s.assignment_id));
      const pending = (assignments || []).filter(a => !submittedIds.has(a.id));
      pendingAssignments = pending.length;

      document.getElementById('stat-assignments').textContent = pending.length;

      const assignList = document.getElementById('assignments-list');
      if (!pending.length) {
        assignList.innerHTML = `<div class="sc-card-flat" style="text-align:center;color:var(--sc-muted);padding:1.5rem;"><span style="font-size:1.5rem;">✅</span><br>Tous les devoirs sont à jour !</div>`;
      } else {
        assignList.innerHTML = pending.slice(0,5).map(a => {
          const courseObj = courses.find(c => c.id === a.course_id);
          const isOverdue = a.due_date && new Date(a.due_date) < new Date();
          return `
            <div class="sc-card" style="padding:1rem;display:flex;align-items:center;gap:1rem;cursor:pointer;animation:slideUp .3s ease;" onclick="window.location.href='course.html?id=${a.course_id}'">
              <div style="width:40px;height:40px;border-radius:10px;background:${courseObj?.color||'#4f46e5'}22;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                <svg width="18" height="18" fill="none" stroke="${courseObj?.color||'#4f46e5'}" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12h6M9 16h6M9 8h6M5 3h14a2 2 0 012 2v16a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2z"/></svg>
              </div>
              <div style="flex:1;min-width:0;">
                <div style="font-weight:600;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${a.title}</div>
                <div style="font-size:.78rem;color:var(--sc-muted);">${courseObj?.name||''} · À rendre : ${schoolFmtDate(a.due_date)}</div>
              </div>
              <span class="sc-badge ${isOverdue ? 'sc-badge-red' : 'sc-badge-amber'}">${isOverdue ? 'En retard' : 'En attente'}</span>
            </div>`;
        }).join('');
      }

      // Exams
      const { data: exams } = await sb
        .from('dalightschool_exams')
        .select('*')
        .in('course_id', courseIds)
        .eq('is_active', true);
      activeExams = (exams || []).length;
      document.getElementById('stat-exams').textContent = activeExams;
    }

    // Average
    const { data: grades } = await sb
      .from('dalightschool_grades')
      .select('grade,max_grade')
      .eq('student_id', session.id);

    const avg = schoolAverage(grades || []);
    document.getElementById('stat-avg').textContent = avg ? avg.toFixed(1) + '%' : '—';
    document.getElementById('welcome-sub').textContent = `${courses.length} cours · ${pendingAssignments} devoirs en attente · Moyenne: ${avg ? avg.toFixed(1)+'%' : 'N/A'}`;
  }

  loadDashboard();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Documents — DALIGHT SCHOOL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/school.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="school-shell">
  <header class="school-header">
    <div class="school-header-logo"><div class="logo-dot"></div>DALIGHT SCHOOL</div>
    <div class="school-header-title">Documents du cours</div>
    <div class="school-header-actions">
      <div class="header-avatar" id="header-avatar">?</div>
      <button class="sc-btn sc-btn-secondary sc-btn-sm" onclick="schoolLogout()">Déconnexion</button>
    </div>
  </header>
  <aside class="school-sidebar">
    <div class="school-sidebar-section">
      <div class="school-sidebar-section-title">Mon cours</div>
      <a href="index.html" class="sc-nav-item"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Tableau de bord</a>
      <a href="materials.html" class="sc-nav-item active"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>Documents</a>
      <a href="assignments.html" class="sc-nav-item"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12h6M9 16h6M9 8h6M5 3h14a2 2 0 012 2v16a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2z"/></svg>Devoirs</a>
      <a href="exams.html" class="sc-nav-item"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Examens</a>
      <a href="grades.html" class="sc-nav-item"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Notes</a>
    </div>
  </aside>
  <main class="school-main">
    <div class="sc-page-header">
      <div><h1>📄 Documents</h1><p>Gérez les ressources pédagogiques de votre cours</p></div>
      <button class="sc-btn sc-btn-primary" onclick="openAddModal()">+ Ajouter un document</button>
    </div>
    <div id="docs-grid" style="display:flex;flex-direction:column;gap:.75rem;">
      <div class="sc-skeleton" style="height:70px;"></div>
      <div class="sc-skeleton" style="height:70px;animation-delay:.1s"></div>
      <div class="sc-skeleton" style="height:70px;animation-delay:.2s"></div>
    </div>
  </main>
</div>

<!-- Add Document Modal -->
<div class="sc-modal-overlay" id="modal-add">
  <div class="sc-modal">
    <div class="sc-modal-header">
      <div class="sc-modal-title">Ajouter un document</div>
      <button class="sc-modal-close" onclick="closeAddModal()">×</button>
    </div>
    <div class="sc-modal-body">
      <div class="sc-form-group">
        <label class="sc-label">Titre <span>*</span></label>
        <input class="sc-input" id="doc-title" placeholder="Ex: Chapitre 1 — Introduction">
      </div>
      <div class="sc-form-group">
        <label class="sc-label">Description</label>
        <input class="sc-input" id="doc-desc" placeholder="Courte description…">
      </div>
      <div class="sc-form-group">
        <label class="sc-label">Type</label>
        <select class="sc-select" id="doc-type">
          <option value="pdf">📄 PDF</option>
          <option value="video">🎬 Vidéo</option>
          <option value="image">🖼️ Image</option>
          <option value="link">🔗 Lien externe</option>
          <option value="doc">📝 Document Word</option>
        </select>
      </div>
      <div id="url-section" class="sc-form-group" style="display:none;">
        <label class="sc-label">URL du lien</label>
        <input class="sc-input" id="doc-url" type="url" placeholder="https://…">
      </div>
      <div id="file-section" class="sc-form-group">
        <label class="sc-label">Fichier</label>
        <div class="sc-upload-zone" onclick="document.getElementById('doc-file').click()">
          <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="margin:0 auto .5rem;display:block;opacity:.4"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
          <div id="file-name-display">Cliquez ou glissez votre fichier ici</div>
        </div>
        <input type="file" id="doc-file" accept=".pdf,.jpg,.jpeg,.png,.mp4,.doc,.docx" style="display:none" onchange="document.getElementById('file-name-display').textContent=this.files[0]?.name||'Fichier sélectionné'">
      </div>
    </div>
    <div class="sc-modal-footer">
      <button class="sc-btn sc-btn-secondary" onclick="closeAddModal()">Annuler</button>
      <button class="sc-btn sc-btn-primary" id="btn-save-doc" onclick="saveDocument()">Enregistrer</button>
    </div>
  </div>
</div>

<script src="../js/school-core.js"></script>
<script>
  const session = requireSchoolSession('professor');
  if (!session) throw new Error('Not logged in');
  const sb = window.schoolSb;
  document.getElementById('header-avatar').textContent = schoolInitials(session.name);

  document.getElementById('doc-type').addEventListener('change', function() {
    document.getElementById('url-section').style.display  = this.value === 'link' ? 'block' : 'none';
    document.getElementById('file-section').style.display = this.value === 'link' ? 'none'  : 'block';
  });

  function openAddModal()  { document.getElementById('modal-add').classList.add('open'); }
  function closeAddModal() { document.getElementById('modal-add').classList.remove('open'); }

  const fileTypeIcon = t => ({ pdf:'📄', video:'🎬', image:'🖼️', link:'🔗', doc:'📝' }[t] || '📄');
  const fileTypeBg   = t => ({ pdf:'#fee2e2', video:'#ede9fe', image:'#dcfce7', link:'#dbeafe', doc:'#fef3c7' }[t] || '#f1f5f9');
  const fileTypeCol  = t => ({ pdf:'#991b1b', video:'#5b21b6', image:'#166534', link:'#1e40af', doc:'#92400e' }[t] || '#374151');

  async function loadDocs() {
    if (!session.course_id) {
      document.getElementById('docs-grid').innerHTML = '<div class="sc-empty"><h3>Aucun cours assigné</h3></div>';
      return;
    }
    const { data: docs, error } = await sb.from('dalightschool_documents').select('*').eq('course_id', session.course_id).order('created_at', { ascending: false });
    const grid = document.getElementById('docs-grid');
    if (!docs?.length) {
      grid.innerHTML = `<div class="sc-empty"><svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg><h3>Aucun document</h3><p>Ajoutez votre premier document de cours.</p></div>`;
      return;
    }
    grid.innerHTML = docs.map((d, i) => `
      <div class="sc-card" style="padding:.9rem 1.1rem;display:flex;align-items:center;gap:.9rem;animation:slideUp .25s ease;animation-delay:${i*0.05}s">
        <div class="sc-doc-icon" style="background:${fileTypeBg(d.file_type)};font-size:1.4rem;">${fileTypeIcon(d.file_type)}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${d.title}</div>
          <div style="font-size:.75rem;color:var(--sc-muted);">${d.description||''} · ${schoolFmtDate(d.created_at)}</div>
        </div>
        <div style="display:flex;gap:.5rem;flex-shrink:0;">
          ${d.file_url ? `<a href="${d.file_url}" target="_blank" class="sc-btn sc-btn-secondary sc-btn-sm">Voir</a>` : ''}
          <button class="sc-btn sc-btn-danger sc-btn-sm" onclick="deleteDoc('${d.id}')">Supprimer</button>
        </div>
      </div>`).join('');
  }

  async function saveDocument() {
    const title = document.getElementById('doc-title').value.trim();
    const type  = document.getElementById('doc-type').value;
    if (!title) { showSchoolToast('Le titre est requis.', 'warning'); return; }

    const btn = document.getElementById('btn-save-doc');
    btn.disabled = true; btn.textContent = 'Enregistrement…';

    let fileUrl = document.getElementById('doc-url').value.trim() || null;
    const file  = document.getElementById('doc-file').files[0];

    if (file && type !== 'link') {
      const ext  = file.name.split('.').pop();
      const path = `${session.course_id}/${Date.now()}.${ext}`;
      const { error: upErr } = await sb.storage.from('school-documents').upload(path, file);
      if (!upErr) {
        const { data: urlData } = sb.storage.from('school-documents').getPublicUrl(path);
        fileUrl = urlData?.publicUrl || null;
      }
    }

    const { error } = await sb.from('dalightschool_documents').insert({
      course_id:   session.course_id,
      title,
      description: document.getElementById('doc-desc').value.trim() || null,
      file_type:   type,
      file_url:    fileUrl,
      uploaded_by: session.id,
      is_visible:  true,
    });

    if (error) { showSchoolToast('Erreur: ' + error.message, 'error'); }
    else { showSchoolToast('Document ajouté !', 'success'); closeAddModal(); loadDocs(); }
    btn.disabled = false; btn.textContent = 'Enregistrer';
  }

  async function deleteDoc(id) {
    if (!confirm('Supprimer ce document ?')) return;
    const { error } = await sb.from('dalightschool_documents').delete().eq('id', id);
    if (error) showSchoolToast('Erreur: ' + error.message, 'error');
    else { showSchoolToast('Document supprimé.', 'success'); loadDocs(); }
  }

  loadDocs();
</script>
</body>
</html>

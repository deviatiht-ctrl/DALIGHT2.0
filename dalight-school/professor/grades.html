<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notes — DALIGHT SCHOOL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/school.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="school-shell">
  <header class="school-header">
    <div class="school-header-logo"><div class="logo-dot"></div>DALIGHT SCHOOL</div>
    <div class="school-header-title">Notes des étudiants</div>
    <div class="school-header-actions">
      <div class="header-avatar" id="header-avatar">?</div>
      <button class="sc-btn sc-btn-secondary sc-btn-sm" onclick="schoolLogout()">Déconnexion</button>
    </div>
  </header>
  <aside class="school-sidebar">
    <div class="school-sidebar-section">
      <div class="school-sidebar-section-title">Mon cours</div>
      <a href="index.html" class="sc-nav-item"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Tableau de bord</a>
      <a href="materials.html" class="sc-nav-item"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>Documents</a>
      <a href="assignments.html" class="sc-nav-item"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12h6M9 16h6M9 8h6M5 3h14a2 2 0 012 2v16a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2z"/></svg>Devoirs</a>
      <a href="exams.html" class="sc-nav-item"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Examens</a>
      <a href="grades.html" class="sc-nav-item active"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Notes</a>
    </div>
  </aside>
  <main class="school-main">
    <div class="sc-page-header">
      <div><h1><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="display:inline;vertical-align:text-bottom;margin-right:.3rem;"><path d="M12 14l9-5-9-5-9 5 9 5z"/><path d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/></svg>Notes</h1><p>Saisir des notes manuelles et consulter les moyennes</p></div>
      <button class="sc-btn sc-btn-primary" onclick="document.getElementById('modal-add-grade').classList.add('open')">+ Saisir une note</button>
    </div>
    <div id="grades-content">
      <div class="sc-skeleton" style="height:300px;"></div>
    </div>
  </main>
</div>

<!-- Add Grade Modal -->
<div class="sc-modal-overlay" id="modal-add-grade">
  <div class="sc-modal">
    <div class="sc-modal-header">
      <div class="sc-modal-title">Saisir une note</div>
      <button class="sc-modal-close" onclick="document.getElementById('modal-add-grade').classList.remove('open')">×</button>
    </div>
    <div class="sc-modal-body">
      <div class="sc-form-group">
        <label class="sc-label">Étudiant <span>*</span></label>
        <select class="sc-select" id="ng-student"></select>
      </div>
      <div class="sc-form-group">
        <label class="sc-label">Type</label>
        <select class="sc-select" id="ng-type">
          <option value="manual">Note manuelle</option>
          <option value="exam">Examen local</option>
          <option value="attendance">Présence / Participation</option>
          <option value="final">Note finale</option>
        </select>
      </div>
      <div class="sc-form-group">
        <label class="sc-label">Titre / Description</label>
        <input class="sc-input" id="ng-title" placeholder="Ex: Examen final T1">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
        <div class="sc-form-group">
          <label class="sc-label">Note obtenue <span>*</span></label>
          <input class="sc-input" id="ng-grade" type="number" min="0" placeholder="Ex: 85">
        </div>
        <div class="sc-form-group">
          <label class="sc-label">Note max</label>
          <input class="sc-input" id="ng-max" type="number" value="100" min="1">
        </div>
      </div>
      <div class="sc-form-group">
        <label class="sc-label">Notes / Commentaire</label>
        <textarea class="sc-textarea" id="ng-notes" placeholder="Observation…" style="min-height:70px;"></textarea>
      </div>
    </div>
    <div class="sc-modal-footer">
      <button class="sc-btn sc-btn-secondary" onclick="document.getElementById('modal-add-grade').classList.remove('open')">Annuler</button>
      <button class="sc-btn sc-btn-primary" id="btn-save-ng" onclick="saveNewGrade()">Enregistrer</button>
    </div>
  </div>
</div>

<script src="../js/school-core.js"></script>
<script>
  const session = requireSchoolSession('professor');
  if (!session) throw new Error('Not logged in');
  const sb = window.schoolSb;
  document.getElementById('header-avatar').textContent = schoolInitials(session.name);

  let students = [];

  async function loadGrades() {
    if (!session.course_id) {
      document.getElementById('grades-content').innerHTML = '<div class="sc-empty"><h3>Aucun cours assigné</h3></div>';
      return;
    }

    const { data: enrollments } = await sb
      .from('dalightschool_enrollments')
      .select('*, student:dalightschool_students(*)')
      .eq('course_id', session.course_id);

    students = (enrollments || []).map(e => e.student).filter(Boolean);

    // Populate student select in modal
    document.getElementById('ng-student').innerHTML = students.map(s => `<option value="${s.id}">${s.name}</option>`).join('') || '<option value="">— Aucun étudiant —</option>';

    const { data: grades } = await sb
      .from('dalightschool_grades')
      .select('*')
      .eq('course_id', session.course_id)
      .order('created_at', { ascending: false });

    const typeLabel = { manual:'Note manuelle', exam:'Examen', attendance:'Présence', final:'Final', assignment:'Devoir', devoir:'Devoir', examen:'Examen' };
    const typeBadge = t => ({ exam:'sc-badge-purple', assignment:'sc-badge-amber', final:'sc-badge-primary', attendance:'sc-badge-green', manual:'sc-badge-gray' }[t] || 'sc-badge-gray');

    // Build per-student summary
    const studentRows = students.map(s => {
      const sg = (grades || []).filter(g => g.student_id === s.id);
      const avg = schoolAverage(sg.map(g => ({ grade: g.grade, max_grade: g.max_grade || 100 })));
      const gRows = sg.map(g => `
        <tr>
          <td>${g.title || typeLabel[g.type] || g.type}</td>
          <td><span class="sc-badge ${typeBadge(g.type)}">${typeLabel[g.type]||g.type}</span></td>
          <td style="font-weight:700;color:${schoolScoreColor(g.grade,g.max_grade||100)};">${g.grade}/${g.max_grade||100}</td>
          <td style="font-size:.78rem;color:var(--sc-muted);">${schoolFmtDate(g.created_at)}</td>
          <td><button class="sc-btn sc-btn-danger sc-btn-sm" onclick="deleteGrade('${g.id}')">×</button></td>
        </tr>`).join('');

      return `
        <div style="margin-bottom:1.5rem;">
          <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;">
            ${schoolAvatarHTML(s.name, s.avatar_url, 36, '#4f46e5')}
            <div>
              <div style="font-weight:700;">${s.name}</div>
              <div style="font-size:.75rem;color:var(--sc-muted);">${s.code_acces}</div>
            </div>
            <div style="margin-left:auto;text-align:right;">
              <div style="font-size:.7rem;color:var(--sc-muted);">Moyenne</div>
              <div style="font-weight:800;font-size:1.1rem;color:${avg ? schoolScoreColor(avg,100) : 'var(--sc-muted)'};">${avg ? avg.toFixed(1)+'%' : '—'}</div>
            </div>
          </div>
          ${sg.length ? `
            <div class="sc-table-wrap">
              <table class="sc-table">
                <thead><tr><th>Évaluation</th><th>Type</th><th>Note</th><th>Date</th><th></th></tr></thead>
                <tbody>${gRows}</tbody>
              </table>
            </div>` : '<div style="font-size:.8rem;color:var(--sc-muted);padding:.5rem .25rem;">Aucune note saisie</div>'}
        </div>`;
    }).join('');

    document.getElementById('grades-content').innerHTML = students.length
      ? `<div class="sc-card-flat">${studentRows}</div>`
      : '<div class="sc-empty"><h3>Aucun étudiant inscrit</h3></div>';
  }

  async function saveNewGrade() {
    const studentId = document.getElementById('ng-student').value;
    const grade     = parseFloat(document.getElementById('ng-grade').value);
    const max       = parseFloat(document.getElementById('ng-max').value) || 100;
    if (!studentId || isNaN(grade)) { showSchoolToast('Étudiant et note requis.', 'warning'); return; }

    const btn = document.getElementById('btn-save-ng');
    btn.disabled = true; btn.textContent = 'Enregistrement…';

    const { error } = await sb.from('dalightschool_grades').insert({
      student_id: studentId,
      course_id:  session.course_id,
      type:       document.getElementById('ng-type').value,
      title:      document.getElementById('ng-title').value.trim() || null,
      grade,
      max_grade:  max,
      notes:      document.getElementById('ng-notes').value.trim() || null,
      graded_by:  session.id,
    });

    if (error) { showSchoolToast('Erreur: ' + error.message, 'error'); }
    else { showSchoolToast('Note enregistrée !', 'success'); document.getElementById('modal-add-grade').classList.remove('open'); loadGrades(); }
    btn.disabled = false; btn.textContent = 'Enregistrer';
  }

  async function deleteGrade(id) {
    if (!confirm('Supprimer cette note ?')) return;
    const { error } = await sb.from('dalightschool_grades').delete().eq('id', id);
    if (error) showSchoolToast('Erreur: ' + error.message, 'error');
    else { showSchoolToast('Note supprimée.', 'success'); loadGrades(); }
  }

  loadGrades();
</script>
</body>
</html>

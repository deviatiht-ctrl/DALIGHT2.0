<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Devoirs — DALIGHT SCHOOL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/school.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="school-shell">
  <header class="school-header">
    <div class="school-header-logo"><div class="logo-dot"></div>DALIGHT SCHOOL</div>
    <div class="school-header-title">Devoirs &amp; Corrections</div>
    <div class="school-header-actions">
      <div class="header-avatar" id="header-avatar">?</div>
      <button class="sc-btn sc-btn-secondary sc-btn-sm" onclick="schoolLogout()">Déconnexion</button>
    </div>
  </header>
  <aside class="school-sidebar">
    <div class="school-sidebar-section">
      <div class="school-sidebar-section-title">Mon cours</div>
      <a href="index.html" class="sc-nav-item"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Tableau de bord</a>
      <a href="materials.html" class="sc-nav-item"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>Documents</a>
      <a href="assignments.html" class="sc-nav-item active"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12h6M9 16h6M9 8h6M5 3h14a2 2 0 012 2v16a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2z"/></svg>Devoirs</a>
      <a href="exams.html" class="sc-nav-item"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Examens</a>
      <a href="grades.html" class="sc-nav-item"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Notes</a>
    </div>
  </aside>
  <main class="school-main">
    <div class="sc-page-header">
      <div><h1><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="display:inline;vertical-align:text-bottom;margin-right:.3rem;"><path d="M9 12h6M9 16h6M9 8h6M5 3h14a2 2 0 012 2v16a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2z"/></svg>Devoirs</h1><p>Voir les soumissions et noter les travaux des étudiants</p></div>
    </div>
    <div id="assignments-content">
      <div class="sc-skeleton" style="height:200px;margin-bottom:1rem;"></div>
    </div>
  </main>
</div>

<!-- Grade Modal -->
<div class="sc-modal-overlay" id="grade-modal">
  <div class="sc-modal">
    <div class="sc-modal-header">
      <div class="sc-modal-title">Corriger la soumission</div>
      <button class="sc-modal-close" onclick="closeGradeModal()">×</button>
    </div>
    <div class="sc-modal-body">
      <div class="sc-form-group">
        <label class="sc-label">Étudiant</label>
        <div id="grade-student" style="font-weight:600;padding:.5rem;background:var(--sc-bg);border-radius:6px;"></div>
      </div>
      <div id="grade-file-section" class="sc-form-group"></div>
      <div id="grade-text-section" class="sc-form-group"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
        <div class="sc-form-group">
          <label class="sc-label">Note obtenue <span>*</span></label>
          <input class="sc-input" id="grade-value" type="number" min="0" placeholder="Ex: 85">
        </div>
        <div class="sc-form-group">
          <label class="sc-label">Note max</label>
          <input class="sc-input" id="grade-max" type="number" value="100" min="1">
        </div>
      </div>
      <div class="sc-form-group">
        <label class="sc-label">Feedback (optionnel)</label>
        <textarea class="sc-textarea" id="grade-feedback" placeholder="Commentaire pour l'étudiant…"></textarea>
      </div>
    </div>
    <div class="sc-modal-footer">
      <button class="sc-btn sc-btn-secondary" onclick="closeGradeModal()">Annuler</button>
      <button class="sc-btn sc-btn-primary" id="btn-save-grade" onclick="saveGrade()">Enregistrer la note</button>
    </div>
  </div>
</div>

<script src="../js/school-core.js"></script>
<script>
  const session = requireSchoolSession('professor');
  if (!session) throw new Error('Not logged in');
  const sb = window.schoolSb;
  document.getElementById('header-avatar').textContent = schoolInitials(session.name);

  let currentSubId = null;
  let currentStudentId = null;
  let currentCourseId  = null;

  function closeGradeModal() { document.getElementById('grade-modal').classList.remove('open'); }

  async function loadAssignments() {
    if (!session.course_id) {
      document.getElementById('assignments-content').innerHTML = '<div class="sc-empty"><h3>Aucun cours assigné</h3></div>';
      return;
    }

    const { data: assignments } = await sb.from('dalightschool_assignments').select('*').eq('course_id', session.course_id).order('due_date');

    if (!assignments?.length) {
      document.getElementById('assignments-content').innerHTML = `<div class="sc-empty"><svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M9 12h6M9 16h6M9 8h6"/></svg><h3>Aucun devoir créé</h3><p><a href="index.html" style="color:var(--sc-primary);">Créez un devoir depuis le tableau de bord</a></p></div>`;
      return;
    }

    const html = await Promise.all(assignments.map(async (a, idx) => {
      const { data: subs } = await sb
        .from('dalightschool_submissions')
        .select('*, student:dalightschool_students(name,code_acces)')
        .eq('assignment_id', a.id)
        .order('submitted_at', { ascending: false });

      const subRows = (subs || []).map(s => `
        <tr>
          <td style="font-weight:500;">${s.student?.name || '—'}</td>
          <td style="font-size:.78rem;color:var(--sc-muted);">${schoolFmtDate(s.submitted_at)}</td>
          <td>${s.file_url ? `<a href="${s.file_url}" target="_blank" class="sc-badge sc-badge-primary"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="display:inline;vertical-align:text-bottom;margin-right:.2rem;"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>Fichier</a>` : (s.text_content ? `<span class="sc-badge sc-badge-gray">Texte</span>` : '—')}</td>
          <td>${s.grade != null ? `<span style="font-weight:700;color:${schoolScoreColor(s.grade,a.max_score||100)};">${s.grade}/${a.max_score||100}</span>` : `<button class="sc-btn sc-btn-primary sc-btn-sm" onclick="openGradeModal('${s.id}','${s.student?.name?.replace(/'/g,"\\'")||''}','${s.file_url||''}','${(s.text_content||'').slice(0,100).replace(/'/g,"\\'")}',${a.max_score||100},'${a.course_id}','${s.student_id}')">Noter</button>`}</td>
        </tr>`).join('');

      return `
        <div class="sc-card" style="padding:0;overflow:hidden;margin-bottom:1.25rem;animation:slideUp .3s ease;animation-delay:${idx*0.07}s">
          <div style="background:var(--sc-bg);padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--sc-border);">
            <div>
              <div style="font-weight:700;">${a.title}</div>
              <div style="font-size:.78rem;color:var(--sc-muted);">Limite: ${schoolFmtDate(a.due_date)} · ${(subs||[]).length} soumission(s)</div>
            </div>
            <span class="sc-badge ${(subs||[]).filter(s=>s.grade==null).length > 0 ? 'sc-badge-amber' : 'sc-badge-green'}">${(subs||[]).filter(s=>s.grade==null).length} à corriger</span>
          </div>
          <div class="sc-table-wrap" style="border:none;border-radius:0;">
            <table class="sc-table">
              <thead><tr><th>Étudiant</th><th>Date</th><th>Fichier</th><th>Note</th></tr></thead>
              <tbody>${subRows || '<tr><td colspan="4" style="text-align:center;color:var(--sc-muted);padding:1.5rem;">Aucune soumission</td></tr>'}</tbody>
            </table>
          </div>
        </div>`;
    }));

    document.getElementById('assignments-content').innerHTML = html.join('');
  }

  function openGradeModal(subId, studentName, fileUrl, textContent, maxScore, courseId, studentId) {
    currentSubId     = subId;
    currentStudentId = studentId;
    currentCourseId  = courseId;
    document.getElementById('grade-student').textContent = studentName;
    document.getElementById('grade-file-section').innerHTML = fileUrl ? `<label class="sc-label">Fichier remis</label><a href="${fileUrl}" target="_blank" class="sc-btn sc-btn-secondary sc-btn-sm" style="display:inline-flex;"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="display:inline;vertical-align:text-bottom;margin-right:.3rem;"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>Voir le fichier</a>` : '';
    document.getElementById('grade-text-section').innerHTML = textContent ? `<label class="sc-label">Réponse de l'étudiant</label><div style="padding:.75rem;background:var(--sc-bg);border-radius:6px;font-size:.875rem;max-height:120px;overflow-y:auto;">${textContent}</div>` : '';
    document.getElementById('grade-value').value = '';
    document.getElementById('grade-max').value   = maxScore;
    document.getElementById('grade-feedback').value = '';
    document.getElementById('grade-modal').classList.add('open');
  }

  async function saveGrade() {
    const grade = parseFloat(document.getElementById('grade-value').value);
    const max   = parseFloat(document.getElementById('grade-max').value) || 100;
    if (isNaN(grade)) { showSchoolToast('Veuillez entrer une note.', 'warning'); return; }
    if (grade < 0 || grade > max) { showSchoolToast(`La note doit être entre 0 et ${max}.`, 'warning'); return; }

    const btn = document.getElementById('btn-save-grade');
    btn.disabled = true; btn.textContent = 'Enregistrement…';

    const { error } = await sb.from('dalightschool_submissions').update({
      grade,
      feedback:  document.getElementById('grade-feedback').value.trim() || null,
      graded_at: new Date().toISOString(),
    }).eq('id', currentSubId);

    if (!error) {
      await sb.from('dalightschool_grades').upsert({
        student_id: currentStudentId,
        course_id:  currentCourseId,
        type:       'assignment',
        grade,
        max_grade:  max,
        graded_by:  session.id,
      }, { onConflict: 'student_id,course_id,type' });
    }

    if (error) { showSchoolToast('Erreur: ' + error.message, 'error'); }
    else { showSchoolToast('Note enregistrée !', 'success'); closeGradeModal(); loadAssignments(); }
    btn.disabled = false; btn.textContent = 'Enregistrer la note';
  }

  loadAssignments();
</script>
</body>
</html>
